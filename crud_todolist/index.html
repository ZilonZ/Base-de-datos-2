<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List - CRUD App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>✓ My Tasks</h1>
                <p class="subtitle">Organizante tus tareas de manera simple y eficiente</p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-container">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Agregar una nueva tarea..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="btn-add">
                        <span>+</span> Agregar
                    </button>
                </div>
            </section>

            <!-- Filter Section -->
            <section class="filter-section">
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">
                        Todas <span class="count" id="count-all">0</span>
                    </button>
                    <button class="filter-btn" data-filter="pending">
                        Pendientes <span class="count" id="count-pending">0</span>
                    </button>
                    <button class="filter-btn" data-filter="completed">
                        Completadas <span class="count" id="count-completed">0</span>
                    </button>
                </div>
            </section>

            <!-- Tasks Section -->
            <section class="tasks-section">
                <div id="tasksContainer" class="tasks-container">
                    <!-- Las tareas se cargarán aquí mediante JavaScript -->
                </div>
                <div id="emptyState" class="empty-state">
                    <div class="empty-icon">📝</div>
                    <p>No hay tareas por mostrar.</p>
                    <small>¡Crea una nueva tarea para empezar!</small>
                </div>
            </section>
        </main>
    </div>

    <!-- Edit Modal -->
    <div id="editModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Editar Tarea</h2>
                <button class="modal-close" id="closeModal">&times;</button>
            </div>
            <div class="modal-body">
                <input 
                    type="text" 
                    id="editTaskInput" 
                    class="task-input-modal" 
                    placeholder="Editar tu tarea..."
                >
            </div>
            <div class="modal-footer">
                <button id="cancelBtn" class="btn-cancel">Cancelar</button>
                <button id="saveBtn" class="btn-save">Guardar Cambios</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <script src="script.js"></script>
</body>
</html>
